name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "[0-9]*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build NRO
        run: |
          set -euo pipefail
          docker pull devkitpro/devkita64
          docker run --rm -v "$PWD:/workspace" -w /workspace/sysmodule devkitpro/devkita64 /bin/bash -lc "make install-layout"
          docker run --rm -v "$PWD:/workspace" -w /workspace/overlay devkitpro/devkita64 /bin/bash -lc "make"
          docker run --rm -v "$PWD:/workspace" -w /workspace/overlay-loader devkitpro/devkita64 /bin/bash -lc "make install-layout"
          mkdir -p romfs/sysmodule
          cp sysmodule/atmosphere/contents/0100000000000F12/exefs.nsp romfs/sysmodule/exefs.nsp
          : > romfs/sysmodule/boot2.flag
          mkdir -p romfs/overlay-loader
          cp overlay-loader/atmosphere/contents/0100000000000F13/exefs.nsp romfs/overlay-loader/exefs.nsp
          : > romfs/overlay-loader/boot2.flag
          mkdir -p romfs/overlay
          cp overlay/switch-ha-overlay.ovl romfs/overlay/switch-ha-overlay.ovl
          rm -rf build switch-ha.elf switch-ha.nro
          docker run --rm -v "$PWD:/workspace" -w /workspace devkitpro/devkita64 /bin/bash -lc "make"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: switch-ha
          path: switch-ha.nro

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: switch-ha.nro
